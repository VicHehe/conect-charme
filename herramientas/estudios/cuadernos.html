<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="../../assets/favicon.png">

    <style>
        #autoSaveIndicator {
            position: fixed;
            bottom: 20px;
            right: 24px;
            background: #1f2937;

        .tool-btn {

<script>
/* ============================================================
   AUTH
============================================================ */
const sesion = Auth.requiereLogin();
if (!sesion) throw new Error('Sin sesión');
document.getElementById('avatarBtn').textContent = sesion.nombre.charAt(0).toUpperCase();

/* ============================================================
   ESTADO Y CONSTANTES
============================================================ */
const DATA_PATH = `datos/usuarios/${sesion.rut}/cuadernos.json`;
const MAX_LINEAS = 32;

let cuadernos = [];
let dataSha = null;
let idxCuaderno = null;
let idxHoja = 0;
let modoLector = false;
let autoSaveTimer = null;

/* ============================================================
   COLORES
============================================================ */
const COLORES = {
    "🌸 Rosas":     [{ n:"Baby Pink",    h:"#FADADD" },{ n:"Blush",       h:"#F9C6C9" },{ n:"Pastel Red",  h:"#FF6961" },{ n:"Salmon",      h:"#FFA6C9" }],
    "💜 Morados":   [{ n:"Lavender",     h:"#E6E6FA" },{ n:"Thistle",     h:"#D8BFD8" },{ n:"Pastel Púrp", h:"#CBAACB" },{ n:"Mauve",       h:"#E0B0FF" }],
    "💙 Azules":    [{ n:"Baby Blue",    h:"#AEEEEE" },{ n:"Powder Blue", h:"#B0E0E6" },{ n:"Periwinkle",  h:"#CCCCFF" },{ n:"Ice Blue",    h:"#D6F5FF" }],
    "💚 Verdes":    [{ n:"Mint",         h:"#98FF98" },{ n:"Tea Green",   h:"#D0F0C0" },{ n:"Celadon",     h:"#ACE1AF" },{ n:"Pistachio",   h:"#77DD77" }],
    "💛 Amarillos": [{ n:"Lemon",        h:"#FFFACD" },{ n:"Champagne",   h:"#F7E7CE" },{ n:"Apricot",     h:"#FBCEB1" },{ n:"Pale Gold",   h:"#E6BE8A" }],
    "🧡 Naranjas":  [{ n:"P. Orange",    h:"#FFD8B1" },{ n:"Melon",       h:"#FFE5B4" },{ n:"Peach",       h:"#FFCBA4" },{ n:"Desert Sand", h:"#EDC9AF" }]
};

/* ============================================================
   STORAGE — GITHUB
============================================================ */
async function cargar() {
    try {
        const res = await fetch(`https://yellow-pine-f67f.victortilleria116.workers.dev/?path=${encodeURIComponent(DATA_PATH)}`);
        if (res.ok) {
            const d = await res.json();
            if (d.content) {
                cuadernos = JSON.parse(atob(d.content.replace(/\n/g, '')));
                dataSha = d.sha;
            }
        }
    } catch(e) {}
    renderLista();
    actualizarSelectBusqueda();
}

async function guardar() {
    const body = {
        message: `update cuadernos ${sesion.rut}`,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(cuadernos, null, 2))))
    };
    if (dataSha) body.sha = dataSha;
    try {
        const res = await fetch(`https://yellow-pine-f67f.victortilleria116.workers.dev/?path=${encodeURIComponent(DATA_PATH)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (res.ok) {
            const d = await res.json();
            dataSha = d.content?.sha || dataSha;
        }
    } catch(e) {}
}

/* ============================================================
   UTILIDADES
============================================================ */
function esc(t) {
    if (!t) return '';
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}
function hoy() { return new Date().toISOString().split('T')[0]; }
function mostrarAutoSave() {
    const el = document.getElementById('autoSaveIndicator');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}

/* ============================================================
   PARSEAR MARKDOWN SIMPLE → HTML
============================================================ */
function parsearLinea(texto) {
    if (texto === undefined || texto === null) return '<span class="reader-line empty"> </span>';
    const t = texto;
    if (t.startsWith('## '))  return `<span class="reader-line h1">${parsearInline(t.slice(3))}</span>`;
    if (t.startsWith('### ')) return `<span class="reader-line h2">${parsearInline(t.slice(4))}</span>`;
    if (t.startsWith('- '))   return `<span class="reader-line bullet">${parsearInline(t.slice(2))}</span>`;
    if (t.trim() === '')      return `<span class="reader-line empty"> </span>`;
    return `<span class="reader-line">${parsearInline(t)}</span>`;
}
function parsearInline(t) {
    return esc(t)
        .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
        .replace(/_(.+?)_/g, '<i>$1</i>')
        .replace(/~~(.+?)~~/g, '<s>$1</s>');
}

/* ============================================================
   MODAL COLOR
============================================================ */
let resolverColor = null;
let colorElegido = null;

function mostrarModalColor() {
    return new Promise(resolve => {
        resolverColor = resolve;
        colorElegido = null;
        const grid = document.getElementById('colorGrid');
        let html = '';
        for (const [cat, colores] of Object.entries(COLORES)) {
            html += `<div class="color-category-title">${cat}</div><div class="color-grid">`;
            colores.forEach(c => {
                html += `<div class="color-option" data-hex="${c.h}" data-nombre="${c.n}">
                    <div class="color-swatch" style="background:${c.h};"></div>
                    <div><div class="color-name">${c.n}</div><div class="color-hex">${c.h}</div></div>
                </div>`;
            });
            html += '</div>';
        }
        grid.innerHTML = html;
        grid.querySelectorAll('.color-option').forEach(opt => {
            opt.addEventListener('click', () => {
                grid.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                colorElegido = { nombre: opt.dataset.nombre, hex: opt.dataset.hex };
                cerrarModalColor();
            });
        });
        document.getElementById('modalColor').classList.add('active');
    });
}
function cerrarModalColor() {
    document.getElementById('modalColor').classList.remove('active');
    if (resolverColor) { resolverColor(colorElegido); resolverColor = null; }
}

/* ============================================================
   CREAR / ELIMINAR CUADERNO
============================================================ */
async function crearCuaderno() {
    const asignatura = prompt('Nombre de la asignatura:');
    if (!asignatura || !asignatura.trim()) return;
    const color = await mostrarModalColor();
    if (!color) { alert('⚠️ Debes elegir un color'); return; }
    cuadernos.push({
        id: Date.now(),
        asignatura: asignatura.trim(),
        color: color.hex,
        colorNombre: color.nombre,
        hojas: [{ titulo:'', fecha:hoy(), objetivo:'', lineas:[] }]
    });
    await guardar();
    renderLista();
    actualizarSelectBusqueda();
}

function eliminarCuaderno(idx) {
    if (!confirm(`⚠️ ¿Eliminar "${cuadernos[idx].asignatura}"? Se perderán todas las hojas.`)) return;
    cuadernos.splice(idx, 1);
    guardar();
    if (idxCuaderno === idx) volverLista();
    else renderLista();
    actualizarSelectBusqueda();
}

/* ============================================================
   RENDER LISTA
============================================================ */
function renderLista() {
    const grid = document.getElementById('gridCuadernos');
    if (cuadernos.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
            <div class="empty-icon">📭</div>
            <h3>No tienes cuadernos</h3>
            <p>Crea tu primer cuaderno para empezar</p>
            <button class="btn-primary" onclick="crearCuaderno()">+ Crear cuaderno</button>
        </div>`;
        return;
    }
    grid.innerHTML = cuadernos.map((c, idx) => {
        const totalLineas = c.hojas.reduce((acc, h) => acc + (h.lineas ? h.lineas.length : 0), 0);
        return `
        <div style="position:relative;">
            <button class="card-delete-btn" onclick="event.stopPropagation(); eliminarCuaderno(${idx})">🗑️ Eliminar</button>
            <div class="tool-card" onclick="abrirCuaderno(${idx})">
                <div class="card-thumb" style="background:${c.color};">📓</div>
                <div class="card-body">
                    <h3>${esc(c.asignatura)}</h3>
                    <p>${c.hojas.length} hojas · ${totalLineas} líneas</p>
                    <div style="width:40px;height:5px;background:${c.color};border-radius:4px;margin-top:10px;border:1px solid rgba(0,0,0,0.08);"></div>
                    <small style="color:var(--text-muted);font-size:11px;">${c.colorNombre}</small>
                </div>
            </div>
        </div>`;
    }).join('');
}

/* ============================================================
   ABRIR / VOLVER
============================================================ */
function abrirCuaderno(idx) {
    idxCuaderno = idx;
    idxHoja = 0;
    modoLector = false;
    actualizarModoBadge();
    mostrarVistaEditor();
    renderEditor();
    actualizarStats();
    renderTOC();
}

function volverLista() {
    if (idxCuaderno !== null && !modoLector) guardarSilencioso();
    idxCuaderno = null;
    document.getElementById('vistaLista').style.display = '';
    document.getElementById('vistaEditor').style.display = 'none';
    document.getElementById('seccionBusqueda').style.display = '';
    document.getElementById('seccionEditor').style.display = 'none';
    renderLista();
}

function mostrarVistaEditor() {
    document.getElementById('vistaLista').style.display = 'none';
    document.getElementById('vistaEditor').style.display = '';
    document.getElementById('seccionBusqueda').style.display = 'none';
    document.getElementById('seccionEditor').style.display = '';
}

/* ============================================================
   MODO EDITOR / LECTOR
============================================================ */
function toggleModo() {
    if (!modoLector) guardarSilencioso();
    modoLector = !modoLector;
    actualizarModoBadge();
    renderEditor();
}

function actualizarModoBadge() {
    const badge = document.getElementById('modoBadge');
    const secFormato = document.getElementById('seccionFormato');
    if (modoLector) {
        badge.textContent = 'Lector 👁️';
        badge.className = 'mode-badge reader';
        if (secFormato) secFormato.style.display = 'none';
    } else {
        badge.textContent = 'Editor ✏️';
        badge.className = 'mode-badge editor';
        if (secFormato) secFormato.style.display = '';
    }
}

/* ============================================================
   RENDER EDITOR
============================================================ */
function renderEditor() {
    if (idxCuaderno === null) return;
    const cuaderno = cuadernos[idxCuaderno];
    if (!cuaderno.hojas[idxHoja]) {
        cuaderno.hojas[idxHoja] = { titulo:'', fecha:hoy(), objetivo:'', lineas:[] };
        guardar();
    }
    const hoja = cuaderno.hojas[idxHoja];

    document.getElementById('cuadernoHeaderBar').innerHTML = `
        <h1 style="border-left-color:${cuaderno.color};">📓 ${esc(cuaderno.asignatura)}</h1>
        <p>Hoja ${idxHoja + 1} de ${cuaderno.hojas.length}</p>
    `;

    document.getElementById('paginaInfo').textContent = `${idxHoja + 1} / ${cuaderno.hojas.length}`;
    document.getElementById('saltarA').max = cuaderno.hojas.length;
    document.getElementById('saltarA').value = idxHoja + 1;
    document.getElementById('btnPrimera').disabled = idxHoja === 0;
    document.getElementById('btnAnterior').disabled = idxHoja === 0;
    document.getElementById('btnSiguiente').disabled = idxHoja === cuaderno.hojas.length - 1;
    document.getElementById('btnUltima').disabled = idxHoja === cuaderno.hojas.length - 1;

    renderTOC();
    if (modoLector) renderLector(cuaderno, hoja);
    else renderFormEditor(cuaderno, hoja);
}

/* ============================================================
   RENDER FORM EDITOR
============================================================ */
function renderFormEditor(cuaderno, hoja) {
    const lineasTxt = hoja.lineas ? hoja.lineas.join('\n') : '';
    const count = hoja.lineas ? hoja.lineas.length : 0;
    const wcount = contarPalabras(lineasTxt);
    const cClass = count >= MAX_LINEAS ? 'danger' : count >= MAX_LINEAS * 0.8 ? 'warning' : '';

    document.getElementById('hojaContenido').innerHTML = `
        <div class="hoja-card">
            <div class="editor-row">
                <div class="editor-field" style="flex:2;">
                    <label>Título *</label>
                    <input type="text" id="inTitulo" value="${esc(hoja.titulo)}" placeholder="Ej: Derivadas e integrales">
                </div>
                <div class="editor-field" style="flex:1;">
                    <label>Fecha *</label>
                    <input type="date" id="inFecha" value="${hoja.fecha || hoy()}">
                </div>
            </div>
            <div class="editor-field">
                <label>Objetivo (opcional)</label>
                <input type="text" id="inObjetivo" value="${esc(hoja.objetivo)}" placeholder="¿Qué quieres aprender hoy?">
            </div>
            <div class="editor-field">
                <label>Contenido · usa ## Subtítulo, ### Sub2, - viñeta, **negrita**, _cursiva_</label>
                <textarea id="inLineas" rows="18" placeholder="Escribe tus apuntes aquí...">${esc(lineasTxt)}</textarea>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px;">
                    <span class="words-counter" id="contadorPalabras">${wcount} palabras</span>
                    <span class="lineas-counter ${cClass}" id="contadorLineas">${count} / ${MAX_LINEAS} líneas</span>
                </div>
            </div>
            <div class="editor-actions">
                <button class="btn-primary" id="btnGuardar">💾 Guardar</button>
                <button class="btn-secondary" id="btnNuevaHoja">+ Nueva hoja</button>
                <button class="btn-danger" id="btnEliminarHoja">🗑️ Eliminar hoja</button>
            </div>
        </div>
    `;

    const ta = document.getElementById('inLineas');
    ta.addEventListener('input', () => { actualizarContador(); programarAutoSave(); });
    ta.addEventListener('keydown', manejarAtajos);
    document.getElementById('btnGuardar').addEventListener('click', guardarHoja);
    document.getElementById('btnNuevaHoja').addEventListener('click', () => nuevaHoja());
    document.getElementById('btnEliminarHoja').addEventListener('click', eliminarHoja);

    document.querySelectorAll('.tool-btn[data-fmt]').forEach(btn => {
        btn.onclick = () => insertarPrefijo(btn.dataset.fmt);
    });
    document.querySelectorAll('.tool-btn[data-fmt-wrap]').forEach(btn => {
        btn.onclick = () => envolverSeleccion(btn.dataset.fmtWrap);
    });
}

/* ============================================================
   RENDER LECTOR
============================================================ */
function renderLector(cuaderno, hoja) {
    const lineas = hoja.lineas || [];
    const linesHtml = lineas.length
        ? lineas.map(l => parsearLinea(l)).join('')
        : '<span class="reader-line" style="color:#bbb;font-style:italic;">Hoja vacía</span>';

    document.getElementById('hojaContenido').innerHTML = `
        <div class="reader-page" style="border-left-color:${cuaderno.color};">
            <div class="reader-tipo-badge">Hoja ${idxHoja + 1}</div>
            <div class="reader-lines">
                <div class="reader-page-title">${esc(hoja.titulo) || 'Sin título'}</div>
                <div class="reader-page-meta">📅 ${hoja.fecha || '—'}${hoja.objetivo ? ` · 🎯 ${esc(hoja.objetivo)}` : ''}</div>
                <div style="margin-top:4px;">${linesHtml}</div>
            </div>
            <div class="reader-page-num">— ${idxHoja + 1} / ${cuaderno.hojas.length} —</div>
        </div>
    `;
}

/* ============================================================
   TABLA DE CONTENIDOS
============================================================ */
function renderTOC() {
    if (idxCuaderno === null) return;
    const cuaderno = cuadernos[idxCuaderno];
    const container = document.getElementById('tocContainer');
    if (!container) return;
    if (cuaderno.hojas.length === 0) {
        container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px;">Sin hojas aún</div>';
        return;
    }
    container.innerHTML = cuaderno.hojas.map((h, i) => {
        const style = i === idxHoja ? 'background:var(--yellow-light);color:var(--yellow-dark);' : '';
        return `<button class="toc-item${!h.titulo ? ' sin-titulo' : ''}" style="${style}" onclick="saltarHoja(${i + 1})">
            <span class="toc-item-num">${i + 1}.</span>${h.titulo ? esc(h.titulo) : 'Sin título'}
        </button>`;
    }).join('');
}

/* ============================================================
   ESTADÍSTICAS
============================================================ */
function actualizarStats() {
    if (idxCuaderno === null) return;
    const c = cuadernos[idxCuaderno];
    let totalLineas = 0, totalPalabras = 0, ultimaFecha = '';
    c.hojas.forEach(h => {
        totalLineas += h.lineas ? h.lineas.length : 0;
        totalPalabras += contarPalabras((h.lineas || []).join(' '));
        if (h.fecha && h.fecha > ultimaFecha) ultimaFecha = h.fecha;
    });
    document.getElementById('statHojas').textContent = c.hojas.length;
    document.getElementById('statLineas').textContent = totalLineas;
    document.getElementById('statPalabras').textContent = totalPalabras;
    const fechaEl = document.getElementById('statFecha');
    if (fechaEl) fechaEl.textContent = ultimaFecha ? ultimaFecha.slice(5) : '—';
}

function contarPalabras(texto) {
    return texto.trim() === '' ? 0 : texto.trim().split(/\s+/).length;
}

/* ============================================================
   GUARDAR
============================================================ */
function leerCampos() {
    return {
        titulo: document.getElementById('inTitulo')?.value?.trim() || '',
        fecha: document.getElementById('inFecha')?.value || hoy(),
        objetivo: document.getElementById('inObjetivo')?.value?.trim() || '',
        lineas: (document.getElementById('inLineas')?.value || '').split('\n').slice(0, MAX_LINEAS)
    };
}

function guardarSilencioso() {
    if (idxCuaderno === null || modoLector) return;
    const campos = leerCampos();
    if (!campos.titulo && campos.lineas.every(l => !l.trim())) return;
    const hoja = cuadernos[idxCuaderno].hojas[idxHoja];
    hoja.titulo = campos.titulo;
    hoja.fecha = campos.fecha;
    hoja.objetivo = campos.objetivo;
    hoja.lineas = campos.lineas;
    guardar();
    actualizarStats();
    renderTOC();
}

function programarAutoSave() {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
        guardarSilencioso();
        mostrarAutoSave();
    }, 1500);
}

function guardarHoja() {
    const campos = leerCampos();
    if (!campos.titulo) { alert('⚠️ El título es obligatorio'); return; }
    if (!campos.fecha) { alert('⚠️ La fecha es obligatoria'); return; }
    const hoja = cuadernos[idxCuaderno].hojas[idxHoja];
    hoja.titulo = campos.titulo;
    hoja.fecha = campos.fecha;
    hoja.objetivo = campos.objetivo;
    hoja.lineas = campos.lineas;
    guardar();
    actualizarStats();
    renderTOC();
    mostrarAutoSave();
    const lineasReales = campos.lineas.filter(l => l.trim()).length;
    if (lineasReales >= MAX_LINEAS) {
        if (confirm(`✨ ¡Llegaste al máximo de ${MAX_LINEAS} líneas!\n¿Crear nueva hoja automáticamente?`)) {
            nuevaHoja();
        }
    }
}

/* ============================================================
   NUEVA HOJA / ELIMINAR HOJA
============================================================ */
function nuevaHoja() {
    guardarSilencioso();
    const cuaderno = cuadernos[idxCuaderno];
    cuaderno.hojas.push({ titulo:'', fecha:hoy(), objetivo:'', lineas:[] });
    guardar();
    idxHoja = cuaderno.hojas.length - 1;
    renderEditor();
    actualizarStats();
    renderTOC();
}

function eliminarHoja() {
    const cuaderno = cuadernos[idxCuaderno];
    if (cuaderno.hojas.length === 1) {
        if (confirm('⚠️ Es la única hoja. ¿Eliminar el cuaderno completo?')) {
            eliminarCuaderno(idxCuaderno);
            volverLista();
        }
        return;
    }
    if (!confirm('🗑️ ¿Eliminar esta hoja? No se puede deshacer.')) return;
    cuaderno.hojas.splice(idxHoja, 1);
    if (idxHoja >= cuaderno.hojas.length) idxHoja = cuaderno.hojas.length - 1;
    guardar();
    renderEditor();
    actualizarStats();
    renderTOC();
}

/* ============================================================
   NAVEGACIÓN
============================================================ */
function cambiarHoja(delta) {
    if (!modoLector) guardarSilencioso();
    const c = cuadernos[idxCuaderno];
    const nueva = idxHoja + delta;
    if (nueva >= 0 && nueva < c.hojas.length) { idxHoja = nueva; renderEditor(); }
}

function saltarHoja(n) {
    if (!modoLector) guardarSilencioso();
    const c = cuadernos[idxCuaderno];
    const target = Math.min(Math.max(1, n), c.hojas.length) - 1;
    idxHoja = target;
    renderEditor();
}

/* ============================================================
   FORMATO
============================================================ */
function insertarPrefijo(prefijo) {
    const ta = document.getElementById('inLineas');
    if (!ta) return;
    const start = ta.selectionStart;
    const val = ta.value;
    const lineStart = val.lastIndexOf('\n', start - 1) + 1;
    ta.value = val.slice(0, lineStart) + prefijo + val.slice(lineStart);
    ta.selectionStart = ta.selectionEnd = lineStart + prefijo.length + (start - lineStart);
    ta.focus();
    programarAutoSave();
    actualizarContador();
}

function envolverSeleccion(marca) {
    const ta = document.getElementById('inLineas');
    if (!ta) return;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const val = ta.value;
    const sel = val.slice(start, end) || 'texto';
    ta.value = val.slice(0, start) + marca + sel + marca + val.slice(end);
    ta.selectionStart = start + marca.length;
    ta.selectionEnd = start + marca.length + sel.length;
    ta.focus();
    programarAutoSave();
}

function manejarAtajos(e) {
    if (e.ctrlKey || e.metaKey) {
        if (e.key === 's') { e.preventDefault(); guardarHoja(); }
        if (e.key === 'b') { e.preventDefault(); envolverSeleccion('**'); }
        if (e.key === 'i') { e.preventDefault(); envolverSeleccion('_'); }
    }
}

/* ============================================================
   CONTADOR
============================================================ */
function actualizarContador() {
    const ta = document.getElementById('inLineas');
    const counter = document.getElementById('contadorLineas');
    const wCounter = document.getElementById('contadorPalabras');
    if (!ta) return;
    const lineas = ta.value.split('\n');
    const n = lineas.length;
    if (counter) {
        counter.textContent = `${n} / ${MAX_LINEAS} líneas`;
        counter.className = 'lineas-counter' + (n >= MAX_LINEAS ? ' danger' : n >= MAX_LINEAS * 0.8 ? ' warning' : '');
    }
    if (wCounter) wCounter.textContent = `${contarPalabras(ta.value)} palabras`;
}

/* ============================================================
   BÚSQUEDA
============================================================ */
function actualizarSelectBusqueda() {
    const sel = document.getElementById('buscarEnCuaderno');
    sel.innerHTML = '<option value="">-- Elige un cuaderno --</option>' +
        cuadernos.map((c, i) => `<option value="${i}">${esc(c.asignatura)}</option>`).join('');
}

function realizarBusqueda() {
    const selIdx = document.getElementById('buscarEnCuaderno').value;
    const fecha = document.getElementById('buscarFecha').value;
    const titulo = document.getElementById('buscarTitulo').value.toLowerCase().trim();
    const div = document.getElementById('resultadosBusqueda');
    if (selIdx === '') { alert('⚠️ Debes elegir un cuaderno'); return; }
    if (!fecha && !titulo) { alert('⚠️ Indica al menos una fecha o un título'); return; }
    const cIdx = parseInt(selIdx);
    const cuaderno = cuadernos[cIdx];
    const resultados = [];
    cuaderno.hojas.forEach((h, hIdx) => {
        let ok = true;
        if (fecha && h.fecha !== fecha) ok = false;
        if (titulo && !(h.titulo || '').toLowerCase().includes(titulo)) ok = false;
        if (ok) resultados.push({ hIdx, titulo: h.titulo || 'Sin título', fecha: h.fecha || '—' });
    });
    if (resultados.length === 0) {
        div.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px;text-align:center;">Sin resultados</div>';
        return;
    }
    div.innerHTML = resultados.map(r => `
        <div class="search-result-item" onclick="irAResultado(${cIdx}, ${r.hIdx})">
            <strong>${esc(r.titulo)}</strong>
            <span>📅 ${r.fecha} · hoja ${r.hIdx + 1}</span>
        </div>
    `).join('');
}

function irAResultado(cIdx, hIdx) {
    idxCuaderno = cIdx;
    idxHoja = hIdx;
    modoLector = true;
    actualizarModoBadge();
    mostrarVistaEditor();
    renderEditor();
    actualizarStats();
    document.getElementById('resultadosBusqueda').innerHTML = '';
}

function limpiarBusqueda() {
    document.getElementById('buscarEnCuaderno').value = '';
    document.getElementById('buscarFecha').value = '';
    document.getElementById('buscarTitulo').value = '';
    document.getElementById('resultadosBusqueda').innerHTML = '';
}

/* ============================================================
   EVENTOS
============================================================ */
document.getElementById('btnNuevoCuaderno').addEventListener('click', crearCuaderno);
document.getElementById('btnVerLista').addEventListener('click', e => { e.preventDefault(); volverLista(); });
document.getElementById('btnCerrarColor').addEventListener('click', cerrarModalColor);
document.getElementById('btnCancelarColor').addEventListener('click', cerrarModalColor);
document.getElementById('modalColor').addEventListener('click', e => { if (e.target === document.getElementById('modalColor')) cerrarModalColor(); });
document.getElementById('btnPrimera').addEventListener('click', () => saltarHoja(1));
document.getElementById('btnAnterior').addEventListener('click', () => cambiarHoja(-1));
document.getElementById('btnSiguiente').addEventListener('click', () => cambiarHoja(1));
document.getElementById('btnUltima').addEventListener('click', () => { if (idxCuaderno !== null) saltarHoja(cuadernos[idxCuaderno].hojas.length); });
document.getElementById('btnSaltar').addEventListener('click', () => {
    const v = parseInt(document.getElementById('saltarA').value);
    if (!isNaN(v)) saltarHoja(v);
});
document.getElementById('btnToggleModo').addEventListener('click', toggleModo);
document.getElementById('btnBuscar').addEventListener('click', realizarBusqueda);
document.getElementById('btnLimpiarBusqueda').addEventListener('click', limpiarBusqueda);
window.addEventListener('beforeunload', () => { if (!modoLector) guardarSilencioso(); });

/* ============================================================
   INICIO
============================================================ */
cargar();
</script>
</body>
</html>
