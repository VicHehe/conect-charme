<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conect-Charme — Tareas</title>
    <link rel="icon" type="image/png" href="../../assets/favicon.png">
    <link rel="stylesheet" href="../../css/styles.css">
    <style>
        /* ===== LAYOUT CHECKLIST ===== */
.checklist-layout {
    display: flex;
    height: calc(100vh - 60px);
    margin-top: 0;
    overflow: hidden;
}

/* ===== PANEL IZQUIERDO ===== */
.listas-panel {
    width: 260px;
    min-width: 260px;
    background: white;
    border-right: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding-top: 60px;   /* ← esta línea nueva */
}

.listas-nav-fija {
    padding: 16px 12px 12px;
    border-bottom: 1.5px solid var(--border);
}

.nav-fija-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: all 0.15s;
    margin-bottom: 2px;
}
.nav-fija-item:hover { background: var(--bg); }
.nav-fija-item.active {
    background: var(--blue-light);
    color: var(--blue-dark);
    font-weight: 700;
}
.nav-fija-item .nav-icon-wrap {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    background: var(--bg);
    flex-shrink: 0;
}
.nav-fija-item.active .nav-icon-wrap {
    background: var(--blue);
}

.listas-header {
    padding: 16px 16px 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.btn-nueva-lista {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--blue);
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    font-weight: 700;
}
.btn-nueva-lista:hover { background: var(--blue-light); }

.lista-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 10px;
    margin: 1px 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    color: var(--text);
}
.lista-item:hover { background: var(--bg); }
.lista-item.active {
    background: var(--blue-light);
    color: var(--blue-dark);
    font-weight: 700;
}
.lista-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
}
.lista-nombre { flex: 1; }
.lista-count {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    min-width: 20px;
    text-align: right;
}
.lista-item.active .lista-count { color: var(--blue-dark); }
.lista-delete {
    background: none;
    border: none;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-muted);
    opacity: 0;
    padding: 2px 5px;
    border-radius: 4px;
    transition: all 0.15s;
}
.lista-item:hover .lista-delete { opacity: 1; }
.lista-delete:hover { color: var(--red); background: var(--red-light); }

/* ===== PANEL DERECHO ===== */
.tareas-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
}

.tareas-header {
    background: white;
    padding: 22px 28px 0;
    border-bottom: 1.5px solid var(--border);
}
.tareas-titulo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
}
.tareas-titulo-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
}
.tareas-titulo {
    font-size: 20px;
    font-weight: 800;
    color: var(--black);
    flex: 1;
}
.tareas-count-badge {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    background: var(--bg);
    padding: 3px 10px;
    border-radius: 20px;
}

/* FILTROS */
.filtros-row {
    display: flex;
    gap: 0;
}
.filtro-btn {
    padding: 8px 18px;
    border: none;
    background: none;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
}
.filtro-btn:hover { color: var(--blue-dark); }
.filtro-btn.active {
    color: var(--blue-dark);
    border-bottom-color: var(--blue);
}

/* BARRA AGREGAR */
.add-tarea-bar {
    background: white;
    margin: 16px 24px 8px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    padding: 11px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.add-tarea-bar:focus-within {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
}
.add-plus {
    font-size: 18px;
    color: var(--blue);
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
}
.add-tarea-bar input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    background: none;
    color: var(--text);
}
.add-tarea-bar input::placeholder { color: var(--text-muted); }

.add-opciones {
    display: flex;
    gap: 6px;
    align-items: center;
}
.add-opcion-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 4px 9px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
}
.add-opcion-btn:hover { border-color: var(--blue); color: var(--blue); }
.add-opcion-btn.selected { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

.add-btn-icon {
    background: var(--blue);
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
}
.add-btn-icon:hover { background: var(--blue-dark); }

/* LISTA TAREAS */
.tareas-lista {
    flex: 1;
    overflow-y: auto;
    padding: 8px 24px 24px;
}

/* TAREA ITEM */
.tarea-item {
    background: white;
    border-radius: 12px;
    padding: 13px 16px;
    margin-bottom: 6px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border: 1.5px solid var(--border);
    transition: all 0.18s;
    cursor: pointer;
    position: relative;
}
.tarea-item:hover {
    border-color: var(--yellow);
    box-shadow: 0 2px 10px rgba(245,158,11,0.10);
    transform: translateY(-1px);
}
.tarea-item.completada { opacity: 0.5; }
.tarea-item.completada .tarea-texto {
    text-decoration: line-through;
    color: var(--text-muted);
}

/* CHECKBOX */
.tarea-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.18s;
    margin-top: 1px;
    font-size: 11px;
}
.tarea-check:hover { border-color: var(--blue); background: var(--blue-light); }
.tarea-check.checked { background: var(--blue); border-color: var(--blue); color: white; }
.tarea-check.p1 { border-color: #ef4444; }
.tarea-check.p1:hover, .tarea-check.p1.checked { background: #ef4444; border-color: #ef4444; color: white; }
.tarea-check.p2 { border-color: #f97316; }
.tarea-check.p2:hover, .tarea-check.p2.checked { background: #f97316; border-color: #f97316; color: white; }
.tarea-check.p3 { border-color: #3b82f6; }
.tarea-check.p3:hover, .tarea-check.p3.checked { background: #3b82f6; border-color: #3b82f6; color: white; }

.tarea-body { flex: 1; min-width: 0; }
.tarea-texto {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 5px;
    word-break: break-word;
    line-height: 1.4;
}
.tarea-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
}
.tarea-fecha {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 3px;
    font-weight: 500;
}
.tarea-fecha.vencida { color: #ef4444; font-weight: 700; }
.tarea-fecha.hoy { color: #f97316; font-weight: 700; }

.tarea-prioridad-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
}
.badge-p1 { background: #fee2e2; color: #ef4444; }
.badge-p2 { background: #ffedd5; color: #f97316; }
.badge-p3 { background: #dbeafe; color: #3b82f6; }

.tarea-lista-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
}

.tarea-delete {
    background: none;
    border: none;
    font-size: 14px;
    cursor: pointer;
    color: var(--text-muted);
    opacity: 0;
    padding: 4px;
    border-radius: 6px;
    transition: all 0.15s;
    flex-shrink: 0;
}
.tarea-item:hover .tarea-delete { opacity: 1; }
.tarea-delete:hover { color: var(--red); background: var(--red-light); }

/* EMPTY STATE */
.empty-checklist {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
}
.empty-checklist .ei { font-size: 48px; margin-bottom: 14px; }
.empty-checklist h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty-checklist p { font-size: 13px; }

/* MODAL NUEVA LISTA */
.modal-lista-input {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    margin-bottom: 14px;
    font-family: inherit;
    color: var(--text);
}
.modal-lista-input:focus { outline: none; border-color: var(--yellow); }

.colores-grid {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
}
.color-dot {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform 0.15s;
}
.color-dot:hover { transform: scale(1.12); }
.color-dot.selected { border-color: var(--black); transform: scale(1.12); }

/* MODAL TAREA */
.modal-field-group { margin-bottom: 16px; }
.modal-field-group label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--blue-dark);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.modal-field-group input,
.modal-field-group select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    background: white;
    color: var(--text);
}
.modal-field-group input:focus,
.modal-field-group select:focus { outline: none; border-color: var(--yellow); }

.prioridad-selector { display: flex; gap: 6px; }
.prio-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: 10px;
    border: 2px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    background: none;
    transition: all 0.15s;
    text-align: center;
}
.prio-btn[data-prio="1"] { color: #ef4444; }
.prio-btn[data-prio="1"].selected { background: #fee2e2; border-color: #ef4444; }
.prio-btn[data-prio="2"] { color: #f97316; }
.prio-btn[data-prio="2"].selected { background: #ffedd5; border-color: #f97316; }
.prio-btn[data-prio="3"] { color: #3b82f6; }
.prio-btn[data-prio="3"].selected { background: #dbeafe; border-color: #3b82f6; }
.prio-btn[data-prio="0"] { color: var(--text-muted); }
.prio-btn[data-prio="0"].selected { background: var(--bg); border-color: var(--text-muted); }

@media (max-width: 768px) {
    .listas-panel { display: none; }
    .tareas-lista { padding: 8px 12px 20px; }
    .add-tarea-bar { margin: 12px; }
}
    </style>
</head>
<body>

<header class="app-header">
    <div class="header-left">
        <a href="/conect-charme/index.html" class="back-link">←</a>
        <a href="/conect-charme/index.html" class="logo">
            <img src="../../assets/favicon.png" alt="Conect-Charme">
            <span class="logo-text">Tareas</span>
        </a>
    </div>
    <div class="header-right">
        <div class="avatar" id="avatarBtn"></div>
    </div>
</header>

<div class="checklist-layout">

<!-- PANEL IZQUIERDO — LISTAS -->
<div class="listas-panel">
    <div class="listas-nav-fija">
        <div class="nav-fija-item active" data-vista="todas" onclick="cambiarVista('todas', this)">
            <div class="nav-icon-wrap">📋</div>
            <span style="flex:1">Todas</span>
            <span class="lista-count" id="countTodas"></span>
        </div>
        <div class="nav-fija-item" data-vista="hoy" onclick="cambiarVista('hoy', this)">
            <div class="nav-icon-wrap">📅</div>
            <span style="flex:1">Hoy</span>
            <span class="lista-count" id="countHoy"></span>
        </div>
        <div class="nav-fija-item" data-vista="urgentes" onclick="cambiarVista('urgentes', this)">
            <div class="nav-icon-wrap">🔴</div>
            <span style="flex:1">Urgentes</span>
            <span class="lista-count" id="countUrgentes"></span>
        </div>
    </div>

        <div class="listas-header">
            <span>Mis listas</span>
            <button class="btn-nueva-lista" onclick="abrirModalLista()" title="Nueva lista">+</button>
        </div>
        <div id="listasNav"></div>
    </div>

    <!-- PANEL DERECHO — TAREAS -->
    <div class="tareas-panel">
        <div class="tareas-header">
            <div class="tareas-titulo-row">
                <div class="tareas-titulo-dot" id="tituloDot" style="background:#2563EB;"></div>
                <span class="tareas-titulo" id="tituloVista">Todas</span>
                <span class="tareas-count-badge" id="countBadge"></span>
            </div>
            <div class="filtros-row">
                <button class="filtro-btn active" onclick="setFiltro('pendientes', this)">Pendientes</button>
                <button class="filtro-btn" onclick="setFiltro('completadas', this)">Completadas</button>
                <button class="filtro-btn" onclick="setFiltro('todas', this)">Todas</button>
            </div>
        </div>

        <!-- BARRA AGREGAR -->
        <div class="add-tarea-bar" id="addBar">
            <span style="font-size:20px; color:var(--text-muted);">+</span>
            <input type="text" id="inputNuevaTarea" placeholder="Agregar tarea..." maxlength="200">
            <div class="add-opciones">
                <button class="add-opcion-btn" id="btnFechaBar" onclick="toggleFechaBar()">📅</button>
                <input type="date" id="fechaBar" style="display:none; border:1.5px solid var(--border); border-radius:8px; padding:4px 8px; font-size:12px; color:var(--text);">
                <button class="add-opcion-btn" id="btnPrioBar" data-prio="0" onclick="togglePrioBar()">🚩</button>
            </div>
            <button class="add-btn-icon" onclick="agregarTarea()" title="Agregar">↵</button>
        </div>

        <!-- LISTA TAREAS -->
        <div class="tareas-lista" id="tareasLista"></div>
    </div>
</div>

<!-- MODAL NUEVA LISTA -->
<div class="modal-overlay" id="modalLista">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Nueva lista</h3>
            <button class="modal-close" onclick="cerrarModalLista()">✕</button>
        </div>
        <input type="text" class="modal-lista-input" id="inputNombreLista" placeholder="Nombre de la lista..." maxlength="30">
        <div class="colores-grid" id="coloresGrid"></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-secondary" style="flex:1" onclick="cerrarModalLista()">Cancelar</button>
            <button class="btn-primary" style="flex:1" onclick="crearLista()">Crear lista</button>
        </div>
    </div>
</div>

<!-- MODAL EDITAR TAREA -->
<div class="modal-overlay" id="modalTarea">
    <div class="modal-box" style="max-width:480px;">
        <div class="modal-header">
            <h3>Editar tarea</h3>
            <button class="modal-close" onclick="cerrarModalTarea()">✕</button>
        </div>
        <div class="modal-field-group">
            <label>Tarea</label>
            <input type="text" id="editTexto" maxlength="200">
        </div>
        <div class="modal-field-group">
            <label>Fecha de entrega</label>
            <input type="date" id="editFecha">
        </div>
        <div class="modal-field-group">
            <label>Prioridad</label>
            <div class="prioridad-selector">
                <button class="prio-btn" data-prio="1" onclick="selectPrio(1)">🔴 Alta</button>
                <button class="prio-btn" data-prio="2" onclick="selectPrio(2)">🟠 Media</button>
                <button class="prio-btn" data-prio="3" onclick="selectPrio(3)">🔵 Normal</button>
                <button class="prio-btn" data-prio="0" onclick="selectPrio(0)">⚪ Sin prioridad</button>
            </div>
        </div>
        <div class="modal-field-group">
            <label>Lista</label>
            <select id="editLista"></select>
        </div>
        <div style="display:flex; gap:10px; margin-top:8px;">
            <button class="btn-secondary" style="flex:1" onclick="cerrarModalTarea()">Cancelar</button>
            <button class="btn-primary" style="flex:1" onclick="guardarEdicion()">Guardar</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="../../js/github.js"></script>
<script src="../../js/auth.js"></script>
<script>
    const sesion = Auth.requiereLogin();
    if (!sesion) throw new Error('Sin sesión');
    document.getElementById('avatarBtn').textContent = sesion.nombre.charAt(0).toUpperCase();

    const DATA_PATH = `datos/usuarios/${sesion.rut}/checklist.json`;

    const COLORES = ['#ef4444','#f97316','#f59e0b','#22c55e','#3b82f6','#8b5cf6','#ec4899','#6b7280'];

    let data = { listas: [], tareas: [] };
    let dataSha = null;
    let vistaActiva = 'todas';
    let listaActivaId = null;
    let filtroActivo = 'pendientes';
    let colorSeleccionado = COLORES[4];
    let prioBarActual = 0;
    let tareaEditandoId = null;
    let prioEditando = 0;
    let mostrarCompletadas = false;

    // ===== STORAGE =====
    async function cargarDatos() {
        try {
            const res = await fetch(`https://yellow-pine-f67f.victortilleria116.workers.dev/?path=${encodeURIComponent(DATA_PATH)}`);
            if (res.ok) {
                const d = await res.json();
                if (d.content) {
                    data = JSON.parse(atob(d.content.replace(/\n/g,'')));
                    dataSha = d.sha;
                }
            }
        } catch(e) {}
        render();
    }

    async function guardarDatos() {
        const body = {
            message: `update checklist ${sesion.rut}`,
            content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))))
        };
        if (dataSha) body.sha = dataSha;
        try {
            const res = await fetch(`https://yellow-pine-f67f.victortilleria116.workers.dev/?path=${encodeURIComponent(DATA_PATH)}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (res.ok) {
                const d = await res.json();
                dataSha = d.content?.sha || dataSha;
            }
        } catch(e) {}
    }

    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    // ===== RENDER PRINCIPAL =====
    function render() {
        renderListas();
        renderTareas();
        actualizarContadores();
    }

    function renderListas() {
        const nav = document.getElementById('listasNav');
        nav.innerHTML = data.listas.map(l => {
            const count = data.tareas.filter(t => t.listaId === l.id && !t.completada).length;
            const activa = vistaActiva === 'lista' && listaActivaId === l.id;
            return `
                <div class="lista-item ${activa ? 'active' : ''}" onclick="cambiarVista('lista', null, '${l.id}')">
                    <div class="lista-dot" style="background:${l.color};"></div>
                    <span class="lista-nombre">${escHtml(l.nombre)}</span>
                    ${count > 0 ? `<span class="lista-count">${count}</span>` : ''}
                    <button class="lista-delete" onclick="event.stopPropagation(); eliminarLista('${l.id}')" title="Eliminar">✕</button>
                </div>
            `;
        }).join('');
    }

    function getTareasFiltradas() {
        let tareas = [...data.tareas];

        // Filtro por vista
        if (vistaActiva === 'hoy') {
            const hoy = new Date().toISOString().slice(0,10);
            tareas = tareas.filter(t => t.fecha === hoy);
        } else if (vistaActiva === 'urgentes') {
            tareas = tareas.filter(t => t.prioridad === 1);
        } else if (vistaActiva === 'lista') {
            tareas = tareas.filter(t => t.listaId === listaActivaId);
        }

        // Filtro completadas/pendientes
        if (filtroActivo === 'pendientes') tareas = tareas.filter(t => !t.completada);
        else if (filtroActivo === 'completadas') tareas = tareas.filter(t => t.completada);

        // Ordenar: prioridad desc, fecha asc
        tareas.sort((a, b) => {
            if (a.completada !== b.completada) return a.completada ? 1 : -1;
            if (a.prioridad !== b.prioridad) return (a.prioridad || 9) - (b.prioridad || 9);
            if (a.fecha && b.fecha) return a.fecha.localeCompare(b.fecha);
            if (a.fecha) return -1;
            if (b.fecha) return 1;
            return 0;
        });

        return tareas;
    }

    function renderTareas() {
        const lista = document.getElementById('tareasLista');
        const tareas = getTareasFiltradas();

        if (tareas.length === 0) {
            const msgs = {
                pendientes: { icon: '✅', title: '¡Todo al día!', sub: 'No hay tareas pendientes' },
                completadas: { icon: '📋', title: 'Sin completadas', sub: 'Completá tareas para verlas acá' },
                todas: { icon: '📝', title: 'Sin tareas', sub: 'Agregá tu primera tarea arriba' }
            };
            const m = msgs[filtroActivo] || msgs.todas;
            lista.innerHTML = `<div class="empty-checklist"><div class="ei">${m.icon}</div><h3>${m.title}</h3><p>${m.sub}</p></div>`;
            return;
        }

        const hoy = new Date().toISOString().slice(0,10);
        lista.innerHTML = tareas.map(t => {
            const prioClass = t.prioridad ? `p${t.prioridad}` : '';
            const listaNombre = data.listas.find(l => l.id === t.listaId)?.nombre;
            const listaColor = data.listas.find(l => l.id === t.listaId)?.color;

            let fechaHtml = '';
            if (t.fecha) {
                let fechaClass = 'tarea-fecha';
                let fechaIcon = '📅';
                if (t.fecha < hoy && !t.completada) { fechaClass += ' vencida'; fechaIcon = '⚠️'; }
                else if (t.fecha === hoy) { fechaClass += ' hoy'; fechaIcon = '🔔'; }
                fechaHtml = `<span class="${fechaClass}">${fechaIcon} ${formatFecha(t.fecha)}</span>`;
            }

            let prioHtml = '';
            if (t.prioridad === 1) prioHtml = `<span class="tarea-prioridad-badge badge-p1">🔴 Alta</span>`;
            else if (t.prioridad === 2) prioHtml = `<span class="tarea-prioridad-badge badge-p2">🟠 Media</span>`;
            else if (t.prioridad === 3) prioHtml = `<span class="tarea-prioridad-badge badge-p3">🔵 Normal</span>`;

            let listaHtml = '';
            if (listaNombre && vistaActiva !== 'lista') {
                listaHtml = `<span class="tarea-lista-badge" style="background:${listaColor}22; color:${listaColor};">● ${escHtml(listaNombre)}</span>`;
            }

            return `
                <div class="tarea-item ${t.completada ? 'completada' : ''}" onclick="abrirModalTarea('${t.id}')">
                    <div class="tarea-check ${prioClass} ${t.completada ? 'checked' : ''}"
                         onclick="event.stopPropagation(); toggleTarea('${t.id}')">
                        ${t.completada ? '✓' : ''}
                    </div>
                    <div class="tarea-body">
                        <div class="tarea-texto">${escHtml(t.texto)}</div>
                        <div class="tarea-meta">
                            ${fechaHtml}
                            ${prioHtml}
                            ${listaHtml}
                        </div>
                    </div>
                    <button class="tarea-delete" onclick="event.stopPropagation(); eliminarTarea('${t.id}')" title="Eliminar">🗑️</button>
                </div>
            `;
        }).join('');
    }

    function actualizarContadores() {
        const hoy = new Date().toISOString().slice(0,10);
        const pendientes = data.tareas.filter(t => !t.completada);
        document.getElementById('countTodas').textContent = pendientes.length || '';
        document.getElementById('countHoy').textContent = pendientes.filter(t => t.fecha === hoy).length || '';
        document.getElementById('countUrgentes').textContent = pendientes.filter(t => t.prioridad === 1).length || '';

        // Badge header
        const tareas = getTareasFiltradas();
        document.getElementById('countBadge').textContent = tareas.length > 0 ? `${tareas.length} tarea${tareas.length !== 1 ? 's' : ''}` : '';
    }

    // ===== NAVEGACIÓN =====
    function cambiarVista(vista, el, listaId = null) {
        vistaActiva = vista;
        listaActivaId = listaId;

        // Actualizar UI nav fija
        document.querySelectorAll('.nav-fija-item').forEach(i => i.classList.remove('active'));
        if (el) el.classList.add('active');

        // Título
        const titulos = { todas: 'Todas', hoy: 'Hoy', urgentes: 'Urgentes' };
        const colores = { todas: '#2563EB', hoy: '#f97316', urgentes: '#ef4444' };
        if (vista === 'lista') {
            const l = data.listas.find(x => x.id === listaId);
            document.getElementById('tituloVista').textContent = l?.nombre || 'Lista';
            document.getElementById('tituloDot').style.background = l?.color || '#2563EB';
        } else {
            document.getElementById('tituloVista').textContent = titulos[vista];
            document.getElementById('tituloDot').style.background = colores[vista];
        }

        render();
    }

    function setFiltro(filtro, el) {
        filtroActivo = filtro;
        document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderTareas();
        actualizarContadores();
    }

    // ===== AGREGAR TAREA =====
    function toggleFechaBar() {
        const inp = document.getElementById('fechaBar');
        const btn = document.getElementById('btnFechaBar');
        if (inp.style.display === 'none') {
            inp.style.display = '';
            btn.classList.add('selected');
        } else {
            inp.style.display = 'none';
            inp.value = '';
            btn.classList.remove('selected');
        }
    }

    const prioLabels = { 0: '🚩', 1: '🔴', 2: '🟠', 3: '🔵' };
    function togglePrioBar() {
        prioBarActual = (prioBarActual + 1) % 4;
        const btn = document.getElementById('btnPrioBar');
        btn.textContent = prioLabels[prioBarActual];
        btn.classList.toggle('selected', prioBarActual > 0);
    }

    async function agregarTarea() {
        const input = document.getElementById('inputNuevaTarea');
        const texto = input.value.trim();
        if (!texto) return;

        const fecha = document.getElementById('fechaBar').value || null;
        const prioridad = prioBarActual || null;
        const listaId = vistaActiva === 'lista' ? listaActivaId : null;

        data.tareas.push({
            id: genId(),
            texto,
            completada: false,
            prioridad,
            fecha,
            listaId,
            creadoEl: new Date().toISOString()
        });

        input.value = '';
        document.getElementById('fechaBar').value = '';
        document.getElementById('fechaBar').style.display = 'none';
        document.getElementById('btnFechaBar').classList.remove('selected');
        prioBarActual = 0;
        document.getElementById('btnPrioBar').textContent = '🚩';
        document.getElementById('btnPrioBar').classList.remove('selected');

        render();
        guardarDatos();
    }

    document.getElementById('inputNuevaTarea').addEventListener('keydown', e => {
        if (e.key === 'Enter') agregarTarea();
    });

    // ===== TOGGLE COMPLETADA =====
    async function toggleTarea(id) {
        const t = data.tareas.find(x => x.id === id);
        if (!t) return;
        t.completada = !t.completada;
        if (t.completada) t.completadaEl = new Date().toISOString();
        else delete t.completadaEl;
        render();
        guardarDatos();
        mostrarToast(t.completada ? '✅ Tarea completada' : '↩️ Tarea reabierta');
    }

    // ===== ELIMINAR =====
    async function eliminarTarea(id) {
        data.tareas = data.tareas.filter(t => t.id !== id);
        render();
        guardarDatos();
        mostrarToast('🗑️ Tarea eliminada');
    }

    async function eliminarLista(id) {
        if (!confirm('¿Eliminar esta lista? Las tareas dentro quedarán sin lista.')) return;
        data.listas = data.listas.filter(l => l.id !== id);
        data.tareas.forEach(t => { if (t.listaId === id) t.listaId = null; });
        if (listaActivaId === id) { vistaActiva = 'todas'; listaActivaId = null; }
        render();
        guardarDatos();
    }

    // ===== MODAL NUEVA LISTA =====
    function renderColores() {
        document.getElementById('coloresGrid').innerHTML = COLORES.map(c => `
            <div class="color-dot ${c === colorSeleccionado ? 'selected' : ''}"
                 style="background:${c};"
                 onclick="selectColor('${c}')"></div>
        `).join('');
    }

    function selectColor(c) {
        colorSeleccionado = c;
        renderColores();
    }

    function abrirModalLista() {
        document.getElementById('inputNombreLista').value = '';
        colorSeleccionado = COLORES[4];
        renderColores();
        document.getElementById('modalLista').classList.add('active');
        setTimeout(() => document.getElementById('inputNombreLista').focus(), 100);
    }

    function cerrarModalLista() {
        document.getElementById('modalLista').classList.remove('active');
    }

    async function crearLista() {
        const nombre = document.getElementById('inputNombreLista').value.trim();
        if (!nombre) return mostrarToast('Escribí un nombre para la lista');
        data.listas.push({ id: genId(), nombre, color: colorSeleccionado });
        cerrarModalLista();
        render();
        guardarDatos();
        mostrarToast('✅ Lista creada');
    }

    document.getElementById('inputNombreLista').addEventListener('keydown', e => {
        if (e.key === 'Enter') crearLista();
    });

    // ===== MODAL EDITAR TAREA =====
    function abrirModalTarea(id) {
        tareaEditandoId = id;
        const t = data.tareas.find(x => x.id === id);
        if (!t) return;
        document.getElementById('editTexto').value = t.texto;
        document.getElementById('editFecha').value = t.fecha || '';
        prioEditando = t.prioridad || 0;
        document.querySelectorAll('.prio-btn').forEach(b => {
            b.classList.toggle('selected', parseInt(b.dataset.prio) === prioEditando);
        });
        // Select listas
        const sel = document.getElementById('editLista');
        sel.innerHTML = `<option value="">Sin lista</option>` +
            data.listas.map(l => `<option value="${l.id}" ${t.listaId === l.id ? 'selected' : ''}>${escHtml(l.nombre)}</option>`).join('');
        document.getElementById('modalTarea').classList.add('active');
    }

    function cerrarModalTarea() {
        document.getElementById('modalTarea').classList.remove('active');
        tareaEditandoId = null;
    }

    function selectPrio(p) {
        prioEditando = p;
        document.querySelectorAll('.prio-btn').forEach(b => {
            b.classList.toggle('selected', parseInt(b.dataset.prio) === p);
        });
    }

    async function guardarEdicion() {
        const t = data.tareas.find(x => x.id === tareaEditandoId);
        if (!t) return;
        const texto = document.getElementById('editTexto').value.trim();
        if (!texto) return mostrarToast('La tarea no puede estar vacía');
        t.texto = texto;
        t.fecha = document.getElementById('editFecha').value || null;
        t.prioridad = prioEditando || null;
        t.listaId = document.getElementById('editLista').value || null;
        cerrarModalTarea();
        render();
        guardarDatos();
        mostrarToast('✅ Tarea actualizada');
    }

    // ===== UTILS =====
    function formatFecha(iso) {
        const [y, m, d] = iso.split('-');
        return `${d}/${m}/${y}`;
    }

    function escHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function mostrarToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Cerrar modales al hacer click afuera
    document.getElementById('modalLista').addEventListener('click', e => {
        if (e.target === document.getElementById('modalLista')) cerrarModalLista();
    });
    document.getElementById('modalTarea').addEventListener('click', e => {
        if (e.target === document.getElementById('modalTarea')) cerrarModalTarea();
    });

    cargarDatos();
</script>
</body>
</html>
